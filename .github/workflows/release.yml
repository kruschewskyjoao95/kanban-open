# Gera instaladores multiplataforma e anexa à GitHub Release (tag v*).
#
# | SO      | Artefatos              |
# |---------|------------------------|
# | Linux   | AppImage, deb, rpm     |
# | Windows | NSIS (.exe), MSI       |
# | macOS   | DMG (+ .app no bundle) |
#
# Disparo:
#   git tag v0.1.0 && git push origin v0.1.0
#   ou: Actions → Release → Run workflow

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            bundles: appimage,deb,rpm
            os_name: linux
          - platform: windows-latest
            bundles: nsis,msi
            os_name: windows
          - platform: macos-latest
            bundles: dmg
            os_name: macos

    runs-on: ${{ matrix.platform }}
    name: build-${{ matrix.os_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            rpm \
            fuse \
            libfuse2

      - name: Install frontend dependencies
        run: npm ci

      # Linux: NO_STRIP evita falha do linuxdeploy com libs modernas (.relr.dyn)
      # APPIMAGE_EXTRACT_AND_RUN ajuda se FUSE não montar AppImages no runner
      - name: Build Tauri (Linux)
        if: runner.os == 'Linux'
        env:
          NO_STRIP: "1"
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}

      - name: Build Tauri (Windows)
        if: runner.os == 'Windows'
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}

      - name: Build Tauri (macOS)
        if: runner.os == 'macOS'
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}

      - name: List bundle outputs
        shell: bash
        run: |
          echo "== Bundle tree =="
          find src-tauri/target/release/bundle -type f 2>/dev/null | head -80 || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kanban-${{ matrix.os_name }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/nsis/*
            src-tauri/target/release/bundle/msi/*
            src-tauri/target/release/bundle/dmg/*
            src-tauri/target/release/bundle/macos/*
          if-no-files-found: warn
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten and list files for release
        run: |
          mkdir -p dist
          # Collect known installer extensions (ignore intermediate dirs)
          find artifacts -type f \( \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.rpm' -o \
            -name '*.msi' -o \
            -name '*.exe' -o \
            -name '*.dmg' -o \
            -name '*.app.tar.gz' \
          \) -exec cp -v {} dist/ \;
          echo "== Release files =="
          ls -lah dist/

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body: |
            ## Downloads

            | Arquivo | Sistema |
            |---------||---------|
            | `*.AppImage` | Linux (portátil) |
            | `*.deb` | Debian / Ubuntu |
            | `*.rpm` | Fedora / RHEL |
            | `*.exe` (NSIS) | Windows |
            | `*.msi` | Windows (corporativo) |
            | `*.dmg` | macOS |

            ### Notas
            - **Linux AppImage:** `chmod +x Kanban_*.AppImage && ./Kanban_*.AppImage`
            - **Windows:** pode avisar SmartScreen se não houver assinatura de código
            - **macOS:** sem notarização Apple, use clique direito → Abrir na primeira vez
            - Dados locais ficam no `app_data_dir` do SO (ver README)
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
